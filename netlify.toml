[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-store"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
